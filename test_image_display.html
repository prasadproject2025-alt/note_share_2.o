<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Display Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Image Display Test</h2>
        <div class="row">
            <div class="col-md-6">
                <h4>Test 1: JPEG Image</h4>
                <div class="card">
                    <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAAIAAoDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAv/xAAhEAACAQMDBQAAAAAAAAAAAAABAgMABAUGIWGRkqGx0f/EABUBAQEAAAAAAAAAAAAAAAAAAAMF/8QAGhEAAgIDAAAAAAAAAAAAAAAAAAECEgMRkf/aAAwDAQACEQMRAD8AltJagyeH0AthI5xdrLcNM91BF5pX2HaH9bcfaSXWGaRmknyJckliyjqTzSlT54b6bk+h0R+IRjWjBqO6O2mhP//Z" class="card-img-top" alt="Test JPEG">
                    <div class="card-body">
                        <p>This is a test JPEG image (small red square)</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <h4>Test 2: PNG Image</h4>
                <div class="card">
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==" class="card-img-top" alt="Test PNG">
                    <div class="card-body">
                        <p>This is a test PNG image (1x1 transparent pixel)</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <h4>Test 3: Dynamic Image Test</h4>
            <div class="card">
                <div id="dynamic-image-container">
                    <div class="bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                        <i class="fas fa-image text-muted fa-3x"></i>
                    </div>
                </div>
                <div class="card-body">
                    <button class="btn btn-primary" onclick="testDynamicImage()">Load Test Image</button>
                    <button class="btn btn-secondary" onclick="clearImage()">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function testDynamicImage() {
            const container = document.getElementById('dynamic-image-container');

            // Test with a small base64 image
            const testImageBase64 = '/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAAIAAoDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAv/xAAhEAACAQMDBQAAAAAAAAAAAAABAgMABAUGIWGRkqGx0f/EABUBAQEAAAAAAAAAAAAAAAAAAAMF/8QAGhEAAgIDAAAAAAAAAAAAAAAAAAECEgMRkf/aAAwDAQACEQMRAD8AltJagyeH0AthI5xdrLcNM91BF5pX2HaH9bcfaSXWGaRmknyJckliyjqTzSlT54b6bk+h0R+IRjWjBqO6O2mhP//Z';

            container.innerHTML = `
                <img src="data:image/jpeg;base64,${testImageBase64}"
                     class="card-img-top"
                     alt="Dynamic test image"
                     style="height: 200px; object-fit: cover;"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="bg-light d-flex align-items-center justify-content-center"
                     style="height: 200px; display: none;">
                    <i class="fas fa-image text-muted fa-3x"></i><br>
                    <small class="text-muted">Image failed to load</small>
                </div>
            `;
        }

        function clearImage() {
            const container = document.getElementById('dynamic-image-container');
            container.innerHTML = `
                <div class="bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                    <i class="fas fa-image text-muted fa-3x"></i>
                </div>
            `;
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
