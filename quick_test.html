<!DOCTYPE html>
<html>
<head>
    <title>Quick Firebase Test</title>
</head>
<body>
    <h1>Quick Firebase Test</h1>
    <div id="status">Testing...</div>
    <div id="results"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBhnmxrk0feR-4IIMIPPQKTSZTNzRXz__Y",
            authDomain: "notes-sharing-6a8b2.firebaseapp.com",
            databaseURL: "https://notes-sharing-6a8b2-default-rtdb.firebaseio.com",
            projectId: "notes-sharing-6a8b2",
            storageBucket: "notes-sharing-6a8b2.appspot.com",
            messagingSenderId: "172945409962",
            appId: "1:172945409962:web:38481eaf0140bde7ac8dd3"
        };

        const status = document.getElementById('status');
        const results = document.getElementById('results');

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        status.innerHTML = 'Firebase initialized';

        // Test anonymous auth
        firebase.auth().signInAnonymously().then(() => {
            status.innerHTML = '✅ Anonymous auth successful';
            console.log('Auth successful');

            // Test database query
            const notesRef = firebase.database().ref('notes');
            status.innerHTML = 'Querying database...';

            notesRef.once('value').then(snapshot => {
                status.innerHTML = '✅ Query completed';
                results.innerHTML = `
                    <p><strong>Data exists:</strong> ${snapshot.exists()}</p>
                    <p><strong>Number of notes:</strong> ${snapshot.numChildren()}</p>
                `;

                if (snapshot.exists()) {
                    let count = 0;
                    snapshot.forEach(child => {
                        count++;
                        if (count <= 5) {
                            const note = child.val();
                            results.innerHTML += `<p>Note ${count}: ${note.subject_name || 'No title'} (ID: ${child.key})</p>`;
                        }
                    });
                } else {
                    results.innerHTML += '<p><strong>No notes found in database!</strong></p>';
                }
            }).catch(error => {
                status.innerHTML = '❌ Query failed';
                results.innerHTML = `<p><strong>Error:</strong> ${error.message}</p>`;
                console.error('Query error:', error);
            });

        }).catch(error => {
            status.innerHTML = '❌ Anonymous auth failed';
            results.innerHTML = `<p><strong>Auth Error:</strong> ${error.message}</p>`;
            console.error('Auth error:', error);
        });
    </script>
</body>
</html>
