<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Card Display</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Test Note Display</h2>
        <div id="test-notes">
            <div class="card mb-3 note-card">
                <div class="bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                    <i class="fas fa-image text-muted fa-3x"></i>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-8">
                            <h5 class="card-title">Test Subject</h5>
                            <p class="card-text mb-2">
                                <span class="badge bg-primary me-2">CSE101</span>
                                <span class="badge bg-secondary me-2">A1</span>
                                <span class="badge bg-info">2 Year</span>
                            </p>
                            <p class="card-text">
                                <strong>Faculty:</strong> Dr. Test Faculty<br>
                                <small class="text-muted">Posted 2 hours ago</small>
                            </p>
                            <p class="card-text"><small class="text-muted">This is a test description</small></p>
                        </div>
                        <div class="col-md-4 text-end">
                            <div class="mb-3">
                                <h4 class="text-success">₹50</h4>
                                <small class="text-muted">5 likes</small>
                            </div>
                            <button class="btn btn-primary btn-sm">
                                <i class="fas fa-envelope me-1"></i>Message (1 coin)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
