<!DOCTYPE html>
<html>
<head>
    <title>Add Test Note</title>
</head>
<body>
    <h1>Add Test Note to Database</h1>
    <button onclick="addTestNote()">Add Test Note</button>
    <div id="status"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBhnmxrk0feR-4IIMIPPQKTSZTNzRXz__Y",
            authDomain: "notes-sharing-6a8b2.firebaseapp.com",
            databaseURL: "https://notes-sharing-6a8b2-default-rtdb.firebaseio.com",
            projectId: "notes-sharing-6a8b2",
            storageBucket: "notes-sharing-6a8b2.appspot.com",
            messagingSenderId: "172945409962",
            appId: "1:172945409962:web:38481eaf0140bde7ac8dd3"
        };

        const status = document.getElementById('status');

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        function addTestNote() {
            status.innerHTML = 'Authenticating...';

            // Authenticate anonymously first
            firebase.auth().signInAnonymously().then(() => {
                status.innerHTML = 'Adding test note...';

                // Create test note data
                const testNote = {
                    subject_name: "Test Subject - Data Structures",
                    course_code: "CSE201",
                    faculty_name: "Dr. Test Faculty",
                    slot: "A1",
                    year: "2",
                    description: "This is a test note for debugging purposes. Added on " + new Date().toLocaleString(),
                    price: 25,
                    seller_id: "test_seller",
                    created_at: Date.now(),
                    status: "available",
                    likes: 5
                };

                // Add to database
                const notesRef = firebase.database().ref('notes');
                return notesRef.push(testNote);

            }).then(snapshot => {
                status.innerHTML = '✅ Test note added successfully!<br>';
                status.innerHTML += 'Note ID: ' + snapshot.key + '<br>';
                status.innerHTML += '<a href="buy_notes.php">Go to Buy Notes</a> to see if it loads.';
                console.log('Test note added:', snapshot.key);

            }).catch(error => {
                status.innerHTML = '❌ Error: ' + error.message;
                console.error('Error adding test note:', error);
            });
        }
    </script>
</body>
</html>
