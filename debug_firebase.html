<!DOCTYPE html>
<html>
<head>
    <title>Firebase Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #log { background: #f5f5f5; padding: 10px; margin-top: 20px; height: 300px; overflow-y: scroll; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Firebase Connection Debug</h1>
    <div id="status"></div>
    <button onclick="testConnection()">Test Firebase Connection</button>
    <button onclick="testAuth()">Test Authentication</button>
    <button onclick="testWrite()">Test Write</button>
    <button onclick="testRead()">Test Read</button>
    <button onclick="clearLog()">Clear Log</button>
    <div id="log"></div>

    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script>
    function log(message, type = 'info') {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
        logDiv.innerHTML += `<div class="${className}">[${time}] ${message}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(message);
    }
    
    function clearLog() {
        document.getElementById('log').innerHTML = '';
    }
    
    function updateStatus(message, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.className = 'status ' + type;
        statusDiv.textContent = message;
    }
    
    function testConnection() {
        log('Testing Firebase connection...');
        updateStatus('Testing...', 'info');
        
        if (typeof firebase === 'undefined') {
            log('ERROR: Firebase SDK not loaded!', 'error');
            updateStatus('ERROR: Firebase SDK not loaded', 'error');
            return;
        }
        
        log('✓ Firebase SDK loaded', 'success');
        
        if (!firebase.database) {
            log('ERROR: Firebase Database not available', 'error');
            updateStatus('ERROR: Firebase Database not available', 'error');
            return;
        }
        
        log('✓ Firebase Database API available', 'success');
        
        try {
            const db = firebase.database();
            log('✓ Database reference created', 'success');
            updateStatus('Firebase connection OK!', 'success');
        } catch (e) {
            log('ERROR: ' + e.message, 'error');
            updateStatus('ERROR: ' + e.message, 'error');
        }
    }
    
    function testAuth() {
        log('Testing Firebase Authentication...');
        updateStatus('Testing auth...', 'info');
        
        const auth = firebase.auth();
        log('Auth object created', 'info');
        
        if (auth.currentUser) {
            log('✓ Already authenticated: ' + auth.currentUser.uid, 'success');
            updateStatus('Already authenticated', 'success');
            return;
        }
        
        log('Attempting anonymous sign-in...', 'info');
        auth.signInAnonymously().then(() => {
            log('✓ Anonymous authentication successful: ' + auth.currentUser.uid, 'success');
            updateStatus('Authentication successful!', 'success');
        }).catch(error => {
            log('ERROR: Authentication failed - ' + error.code + ': ' + error.message, 'error');
            updateStatus('Authentication failed: ' + error.message, 'error');
        });
    }
    
    function testWrite() {
        log('Testing Firebase Write...');
        updateStatus('Testing write...', 'info');
        
        if (!firebase.database) {
            log('ERROR: Firebase Database not available', 'error');
            return;
        }
        
        const testData = {
            test: true,
            message: 'Test write from debug page',
            timestamp: Date.now()
        };
        
        const testRef = firebase.database().ref('test').push();
        log('Pushing test data...', 'info');
        
        testRef.set(testData).then(() => {
            log('✓ Write successful! Key: ' + testRef.key, 'success');
            updateStatus('Write successful! Check Firebase Console.', 'success');
        }).catch(error => {
            log('ERROR: Write failed - ' + error.code + ': ' + error.message, 'error');
            updateStatus('Write failed: ' + error.message, 'error');
            
            if (error.code === 'PERMISSION_DENIED') {
                log('This means Firebase security rules are blocking the write.', 'error');
                log('Please check Firebase Console → Realtime Database → Rules', 'error');
            }
        });
    }
    
    function testRead() {
        log('Testing Firebase Read...');
        updateStatus('Testing read...', 'info');
        
        firebase.database().ref('test').limitToLast(5).once('value').then(snapshot => {
            if (snapshot.exists()) {
                log('✓ Read successful! Found ' + snapshot.numChildren() + ' test records', 'success');
                snapshot.forEach(child => {
                    log('  - ' + child.key + ': ' + JSON.stringify(child.val()), 'info');
                });
                updateStatus('Read successful!', 'success');
            } else {
                log('No test data found (this is OK)', 'info');
                updateStatus('Read successful (no data)', 'success');
            }
        }).catch(error => {
            log('ERROR: Read failed - ' + error.code + ': ' + error.message, 'error');
            updateStatus('Read failed: ' + error.message, 'error');
        });
    }
    
    // Auto-run connection test on load
    window.addEventListener('load', () => {
        setTimeout(testConnection, 1000);
    });
    </script>
</body>
</html>
